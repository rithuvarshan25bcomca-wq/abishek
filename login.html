<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
}

.login-container{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:130px;
    margin-bottom:10px;
}

h2{
    color:#0d47a1;
    margin-bottom:5px;
}

.subtitle{
    color:#4caf50;
    font-size:14px;
    margin-bottom:25px;
    letter-spacing:1px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.input-box input:focus{
    border-color:#1976d2;
    outline:none;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#0d47a1;
}

.forgot{
    margin-top:15px;
}

.forgot a{
    text-decoration:none;
    color:#1976d2;
    font-size:14px;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<div class="login-container">

    <img src="kprcas-logo.png" alt="KPRCAS Logo" class="logo">

    <h2>KPRCAS Login</h2>
    <p class="subtitle">LEARN BEYOND</p>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>
    </form>

    <div class="footer">
        KPR College of Arts Science and Research
    </div>

</div>

</body>
</html>
